name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  PROJECT: src/LeannMcp/LeannMcp.csproj

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: leann-dotnet.exe
          - os: macos-latest
            rid: osx-arm64
            artifact: leann-dotnet

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish self-contained binary
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/${{ matrix.artifact }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/win-x64/leann-dotnet.exe
            artifacts/osx-arm64/leann-dotnet

      - name: Pack NuGet tool
        run: >
          dotnet pack ${{ env.PROJECT }}
          -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -o nupkg

      - name: Push to ProGet
        run: >
          dotnet nuget push nupkg/*.nupkg
          --source https://proget.onbase.net/nuget/NuGet/v3/index.json
          --api-key ${{ secrets.PROGET_API_KEY }}
          --skip-duplicate